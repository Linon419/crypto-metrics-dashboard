version: '3.8'

services:
  telegram-bot:
    build: .
    container_name: crypto-telegram-bot
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - API_BASE_URL=${API_BASE_URL:-http://localhost:3001/api}
      - ADMIN_CHAT_IDS=${ADMIN_CHAT_IDS}
      - TZ=Asia/Shanghai
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    networks:
      - crypto-network

networks:
  crypto-network:
    external: true