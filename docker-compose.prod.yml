version: '3.3'

services:
  crypto-dashboard:
    image: ghcr.io/linon419/crypto-metrics-dashboard:main  # 使用您已构建的镜像
    container_name: crypto-dashboard
    restart: unless-stopped
    ports:
      - "3080:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      # OpenAI Configuration
      - OPENAI_API_KEY=${OPENAI_API_KEY}  # 从环境变量获取，不要在此处硬编码
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - OPENAI_SYSTEM_PROMPT=${OPENAI_SYSTEM_PROMPT:-你是一个数据清洗专家，请将加密货币指标数据转换为结构化JSON格式。}
      # Custom prompt (optional)
      # - OPENAI_PROMPT=...{{processedText}}...
      # Database Configuration
      - DB_STORAGE=/data/db/database.sqlite
      # JWT Configuration（生产环境必须设置强随机值）
      - JWT_SECRET=${JWT_SECRET}
      # API Configuration
      - API_PUBLIC_HOST=http://168.138.207.11:3080
      # MCP Gateway（公网/局域网部署时必须设置）
      - MCP_GATEWAY_TOKEN=${MCP_GATEWAY_TOKEN}
    volumes:
      - /root/crypto-dashboard/data:/data/db

volumes:
  sqlite-data:
  data-volume:
