<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>收藏功能测试</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .button { padding: 10px 15px; margin: 5px; background: #007bff; color: white; border: none; border-radius: 3px; cursor: pointer; }
        .button:hover { background: #0056b3; }
        .log { background: #f8f9fa; padding: 10px; border-radius: 3px; font-family: monospace; font-size: 12px; max-height: 300px; overflow-y: auto; }
        .status { padding: 10px; margin: 10px 0; border-radius: 3px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 收藏功能测试</h1>
        
        <div class="section">
            <h3>📱 设备信息</h3>
            <p><strong>设备ID:</strong> <span id="deviceId">-</span></p>
            <p><strong>本地缓存:</strong> <span id="localStorage">-</span></p>
        </div>

        <div class="section">
            <h3>🎮 操作测试</h3>
            <button class="button" onclick="testAddFavorite()">添加收藏 (BTC)</button>
            <button class="button" onclick="testRemoveFavorite()">删除收藏 (BTC)</button>
            <button class="button" onclick="testGetFavorites()">获取收藏列表</button>
            <button class="button" onclick="testRefreshPage()">模拟页面刷新</button>
            <button class="button" onclick="clearLogs()">清空日志</button>
        </div>

        <div class="section">
            <h3>📊 状态显示</h3>
            <div id="status" class="status info">准备就绪</div>
        </div>

        <div class="section">
            <h3>📝 操作日志</h3>
            <div id="logs" class="log">等待操作...</div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3001/api';
        let logs = [];

        // 模拟前端的设备ID生成逻辑
        function getDeviceId() {
            const storageKey = 'crypto_dashboard_device_id';
            let deviceId = localStorage.getItem(storageKey);
            
            if (!deviceId) {
                deviceId = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                    const r = Math.random() * 16 | 0;
                    const v = c === 'x' ? r : (r & 0x3 | 0x8);
                    return v.toString(16);
                });
                localStorage.setItem(storageKey, deviceId);
            }
            
            return deviceId;
        }

        function addLog(message) {
            const timestamp = new Date().toLocaleTimeString();
            logs.push(`[${timestamp}] ${message}`);
            document.getElementById('logs').innerHTML = logs.join('\n');
            document.getElementById('logs').scrollTop = document.getElementById('logs').scrollHeight;
        }

        function updateStatus(message, type = 'info') {
            const statusEl = document.getElementById('status');
            statusEl.textContent = message;
            statusEl.className = `status ${type}`;
        }

        function updateDeviceInfo() {
            const deviceId = getDeviceId();
            const favorites = JSON.parse(localStorage.getItem('favoriteCrypto') || '[]');
            
            document.getElementById('deviceId').textContent = deviceId;
            document.getElementById('localStorage').textContent = JSON.stringify(favorites);
        }

        async function testAddFavorite() {
            try {
                addLog('🔄 开始添加收藏 (BTC)');
                updateStatus('正在添加收藏...', 'info');
                
                const deviceId = getDeviceId();
                const response = await fetch(`${API_BASE}/favorites`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-device-id': deviceId
                    },
                    body: JSON.stringify({ symbol: 'BTC' })
                });

                if (response.ok) {
                    const data = await response.json();
                    addLog(`✅ 添加收藏成功: ${JSON.stringify(data)}`);
                    updateStatus('添加收藏成功', 'success');
                    
                    // 更新本地缓存（模拟前端逻辑）
                    const currentFavorites = JSON.parse(localStorage.getItem('favoriteCrypto') || '[]');
                    if (!currentFavorites.includes('BTC')) {
                        const newFavorites = [...currentFavorites, 'BTC'];
                        localStorage.setItem('favoriteCrypto', JSON.stringify(newFavorites));
                        addLog(`📦 本地缓存已更新: ${JSON.stringify(newFavorites)}`);
                    }
                } else {
                    const error = await response.text();
                    addLog(`❌ 添加收藏失败: ${response.status} - ${error}`);
                    updateStatus('添加收藏失败', 'error');
                }
            } catch (error) {
                addLog(`❌ 网络错误: ${error.message}`);
                updateStatus('网络错误', 'error');
            }
            
            updateDeviceInfo();
        }

        async function testRemoveFavorite() {
            try {
                addLog('🔄 开始删除收藏 (BTC)');
                updateStatus('正在删除收藏...', 'info');
                
                const deviceId = getDeviceId();
                const response = await fetch(`${API_BASE}/favorites/BTC`, {
                    method: 'DELETE',
                    headers: {
                        'x-device-id': deviceId
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    addLog(`✅ 删除收藏成功: ${JSON.stringify(data)}`);
                    updateStatus('删除收藏成功', 'success');
                    
                    // 更新本地缓存（模拟前端逻辑）
                    const currentFavorites = JSON.parse(localStorage.getItem('favoriteCrypto') || '[]');
                    const newFavorites = currentFavorites.filter(s => s !== 'BTC');
                    localStorage.setItem('favoriteCrypto', JSON.stringify(newFavorites));
                    addLog(`📦 本地缓存已更新: ${JSON.stringify(newFavorites)}`);
                } else {
                    const error = await response.text();
                    addLog(`❌ 删除收藏失败: ${response.status} - ${error}`);
                    updateStatus('删除收藏失败', 'error');
                }
            } catch (error) {
                addLog(`❌ 网络错误: ${error.message}`);
                updateStatus('网络错误', 'error');
            }
            
            updateDeviceInfo();
        }

        async function testGetFavorites() {
            try {
                addLog('🔄 开始获取收藏列表');
                updateStatus('正在获取收藏列表...', 'info');
                
                const deviceId = getDeviceId();
                const response = await fetch(`${API_BASE}/favorites`, {
                    headers: {
                        'x-device-id': deviceId
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    addLog(`✅ 服务器收藏列表: ${JSON.stringify(data)}`);
                    
                    const localFavorites = JSON.parse(localStorage.getItem('favoriteCrypto') || '[]');
                    addLog(`📦 本地缓存列表: ${JSON.stringify(localFavorites)}`);
                    
                    const isConsistent = JSON.stringify(data) === JSON.stringify(localFavorites);
                    addLog(`🔍 数据一致性: ${isConsistent ? '✅ 一致' : '❌ 不一致'}`);
                    
                    updateStatus(`获取成功 - ${isConsistent ? '数据一致' : '数据不一致'}`, isConsistent ? 'success' : 'error');
                } else {
                    const error = await response.text();
                    addLog(`❌ 获取收藏列表失败: ${response.status} - ${error}`);
                    updateStatus('获取收藏列表失败', 'error');
                }
            } catch (error) {
                addLog(`❌ 网络错误: ${error.message}`);
                updateStatus('网络错误', 'error');
            }
            
            updateDeviceInfo();
        }

        function testRefreshPage() {
            addLog('🔄 模拟页面刷新 - 重新获取收藏列表');
            testGetFavorites();
        }

        function clearLogs() {
            logs = [];
            document.getElementById('logs').innerHTML = '日志已清空';
        }

        // 初始化
        updateDeviceInfo();
        addLog('🚀 测试页面已加载');
    </script>
</body>
</html>
