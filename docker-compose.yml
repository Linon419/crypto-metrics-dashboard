version: '3.8'

services:
  crypto-dashboard:
    build: .
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - API_PUBLIC_HOST=http://localhost:3001
      # Telegram Bot配置
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - API_BASE_URL=http://localhost:3001/api
      - ADMIN_CHAT_IDS=${ADMIN_CHAT_IDS}
      # 数据库路径
      - DB_PATH=/data/dashboard.db
      - TZ=Asia/Shanghai
    volumes:
      - ./data:/data
      - ./telegram-bot/data:/app/telegram-bot/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/api/test"]
      interval: 30s
      timeout: 10s
      retries: 3