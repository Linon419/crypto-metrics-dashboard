version: '3.3'

services:
  crypto-dashboard:
    image: ghcr.io/linon419/crypto-metrics-dashboard:main
    container_name: crypto-dashboard
    restart: unless-stopped
    ports:
      - "3080:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - OPENAI_MODEL=gpt-5-mini
      - DB_STORAGE=/data/db/database.sqlite
      - JWT_SECRET=${JWT_SECRET}
      - API_PUBLIC_HOST=http://168.138.207.11:3080
      # Telegram Bot 配置
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - API_BASE_URL=http://localhost:3001/api
      - ADMIN_CHAT_IDS=${ADMIN_CHAT_IDS}
      - MCP_GATEWAY_TOKEN=${MCP_GATEWAY_TOKEN}
      - TZ=Asia/Shanghai
    volumes:
      - /root/crypto-dashboard/data:/data/db
      - ./telegram-bot/data:/app/telegram-bot/data

volumes:
  sqlite-data:
  data-volume:
